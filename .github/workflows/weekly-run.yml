name: Weekly NRL Supercoach Run

on:
  schedule:
    # Wednesday 08:00 UTC = Wednesday 18:00 AEST
    - cron: '0 8 * * 3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONF }}

      - name: Pull round yaml(s) from Google Drive
        run: |
          mkdir -p data/inputs
          rclone copy "gdrive:NRL-Supercoach/inputs/" data/inputs/ --include "round_*.yaml" -v
          echo "Files in data/inputs/:"
          ls -la data/inputs/

      - name: Detect current round
        run: |
          set -e
          ROUND=$(ls data/inputs/round_*.yaml 2>/dev/null \
            | sed -E 's/.*round_([0-9]+)\.yaml/\1/' \
            | sort -n | tail -1)
          if [ -z "$ROUND" ]; then
            echo "::error::No round_*.yaml found in Google Drive folder NRL-Supercoach/inputs/. Helper must upload one."
            exit 1
          fi
          echo "Detected round: $ROUND"
          echo "ROUND=$ROUND" >> $GITHUB_ENV

      - name: Run main pipeline (scrape + predict + optimize)
        run: python main.py --round $ROUND

      - name: Run trade advisor
        run: python trade_advisor.py --round $ROUND --no-scrape

      - name: List outputs
        run: ls -la outputs/

      - name: Upload outputs to Google Drive
        run: |
          rclone copy outputs/ "gdrive:NRL-Supercoach/round_${ROUND}/" --create-empty-src-dirs -v

      - name: Commit outputs back to repo
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-run results round ${{ env.ROUND }}"
          file_pattern: "outputs/* data/raw/* data/processed/* models/* data/inputs/*"
